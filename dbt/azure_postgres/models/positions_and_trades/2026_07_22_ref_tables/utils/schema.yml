version: 2

models:
  - name: utils_ref_positions_and_trades_product_catalog
    description: >
      Current ref-table product catalog rows from
      positions_and_trades_ref.product_catalog, projected to the active
      logical contract used by NAV and Clear Street matching models.

  - name: utils_ref_positions_and_trades_product_aliases
    description: >
      Current ref-table product alias rules from
      positions_and_trades_ref.product_alias_rules, projected to the
      active logical contract used by source-specific product matching.

  - name: utils_ref_positions_and_trades_account_lookup
    description: >
      Current ref-table account lookup rows from
      positions_and_trades_ref.account_lookup, projected to the active
      logical contract used by NAV and Clear Street account normalization.
      The lookup's account_name currently stores the canonical Helios account
      code exposed downstream as account_code and retained as account_name for
      compatibility.

  - name: utils_ref_positions_and_trades_month_codes
    description: >
      Current ref-table month-code rows from positions_and_trades_ref.month_codes,
      projected to the active logical contract used by contract parsing
      and Excel symbol generation.
