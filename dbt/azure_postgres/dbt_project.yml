name: helioscta_platform
version: "0.1.0"
config-version: 2

profile: helioscta_platform

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  helioscta_platform:
    +enabled: false
    positions_and_trades:
      "2026_07_22_ref_tables":
        utils:
          +enabled: true
          +schema: positions_and_trades_ref_tables
          +materialized: ephemeral
        clear_street_eod_transactions:
          +enabled: true
          +schema: positions_and_trades_ref_tables
          +materialized: ephemeral
        nav_positions:
          +enabled: true
          +schema: positions_and_trades_ref_tables
          +materialized: ephemeral
